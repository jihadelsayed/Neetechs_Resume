<section id="about" class="profile-section profile-section--muted"><div class="profile-section__container profile-about"><img class="nt-avatar nt-avatar--2xl profile-about__avatar" [src]="resume.about.image" [alt]="resume.about.name"><div><p class="profile-section__eyebrow">About</p><h2>{{ resume.about.name }}</h2><p class="profile-section__lead">{{ resume.about.description }}</p><div class="profile-about__details"><div><span>Location</span><p>{{ resume.about.country }}</p></div><div><span>Email</span><p><a [href]="'mailto:' + resume.about.email">{{ resume.about.email }}</a></p></div><div *ngIf="resume.about.number"><span>Phone</span><p><a [href]="'tel:' + resume.about.number">{{ resume.about.number }}</a></p></div></div><a *ngIf="resume.about.resumeDownloadLink" class="nt-button nt-button--secondary" [href]="resume.about.resumeDownloadLink">Download rťsumť</a></div></div></section>
