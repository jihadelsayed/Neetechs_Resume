<section id="contact" class="profile-section"><div class="profile-section__container contact-layout"><div><p class="profile-section__eyebrow">Contact</p><h2>Start a conversation</h2><p class="contact-layout__lead">Use the form to open an email addressed to {{ resume?.about?.name }}.</p><div class="nt-card nt-card--muted contact-layout__details"><div class="nt-card__body"><span>Email</span><a [href]="'mailto:' + resume?.about?.email">{{ resume?.about?.email }}</a><span *ngIf="resume?.about?.number">Phone</span><a *ngIf="resume?.about?.number" [href]="'tel:' + resume?.about?.number">{{ resume?.about?.number }}</a></div></div></div><form #contactForm="ngForm" class="nt-card contact-form" (ngSubmit)="send(contactForm)" novalidate><div class="nt-card__body"><div *ngIf="submitted" class="nt-alert nt-alert--success" role="status"><div class="nt-alert__body"><p class="nt-alert__title">Your email client is ready</p><p class="nt-alert__description">Review and send the message from your email application.</p></div></div><div class="contact-form__grid"><label class="nt-field"><span class="nt-field__label">Name <span class="nt-field__label-required">*</span></span><input class="nt-input" name="name" [(ngModel)]="message.name" required #name="ngModel" [attr.aria-invalid]="name.invalid && (name.touched || contactForm.submitted)" autocomplete="name"><span *ngIf="name.invalid && (name.touched || contactForm.submitted)" class="nt-field__error">Enter your name.</span></label><label class="nt-field"><span class="nt-field__label">Email <span class="nt-field__label-required">*</span></span><input class="nt-input" name="email" [(ngModel)]="message.email" required email #email="ngModel" [attr.aria-invalid]="email.invalid && (email.touched || contactForm.submitted)" autocomplete="email"><span *ngIf="email.invalid && (email.touched || contactForm.submitted)" class="nt-field__error">Enter a valid email address.</span></label></div><label class="nt-field"><span class="nt-field__label">Subject</span><input class="nt-input" name="subject" [(ngModel)]="message.subject"></label><label class="nt-field"><span class="nt-field__label">Message <span class="nt-field__label-required">*</span></span><textarea class="nt-textarea" name="body" [(ngModel)]="message.body" required #body="ngModel" [attr.aria-invalid]="body.invalid && (body.touched || contactForm.submitted)"></textarea><span *ngIf="body.invalid && (body.touched || contactForm.submitted)" class="nt-field__error">Enter a message.</span></label><button class="nt-button nt-button--primary" type="submit">Compose email</button></div></form></div></section>
