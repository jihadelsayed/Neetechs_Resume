<section id="portfolio" class="profile-section profile-section--muted"><div class="profile-section__container"><p class="profile-section__eyebrow">Selected work</p><h2>Projects and portfolio</h2><div class="work-grid"><button *ngFor="let work of resume.works" class="nt-card nt-card--interactive work-card" type="button" (click)="selectedWork = work"><img *ngIf="work.image" class="nt-card__media" [src]="work.image" [alt]="work.title || 'Project image'"><div class="nt-card__body"><h3>{{ work.title }}</h3><p>{{ work.description }}</p><span class="work-card__link">View details ?</span></div></button></div><div *ngIf="!resume.works?.length" class="nt-empty-state nt-empty-state--compact"><div class="nt-empty-state__body"><h3 class="nt-empty-state__title">No portfolio items yet</h3><p class="nt-empty-state__description">Selected work will appear here.</p></div></div></div></section><div *ngIf="selectedWork" class="nt-modal__backdrop" (click)="closeWork()"><section class="nt-modal work-modal" role="dialog" aria-modal="true" [attr.aria-label]="selectedWork.title" (click)="$event.stopPropagation()"><div class="nt-modal__header"><h2>{{ selectedWork.title }}</h2><button class="nt-modal__close" type="button" (click)="closeWork()" aria-label="Close project details">æ</button></div><div class="nt-modal__body"><img *ngIf="selectedWork.image" [src]="selectedWork.image" [alt]="selectedWork.title"><p>{{ selectedWork.description }}</p></div><div *ngIf="selectedWork.url" class="nt-modal__footer"><a class="nt-button nt-button--primary" [href]="selectedWork.url" target="_blank" rel="noopener noreferrer">Visit project</a></div></section></div>
