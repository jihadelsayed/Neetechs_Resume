<section id="google-scholar" class="profile-section profile-section--muted"><div class="profile-section__container"><p class="profile-section__eyebrow">Research</p><h2>Publications</h2><div *ngIf="isLoading" class="nt-loading-state nt-loading-state--compact" aria-live="polite"><span class="nt-loading-state__spinner" aria-hidden="true"></span><div class="nt-loading-state__body"><p class="nt-loading-state__description">Loading publications…</p></div></div><div *ngIf="loadError" class="nt-error-state nt-error-state--inline" role="alert"><div class="nt-error-state__body"><h3 class="nt-error-state__title">Publications are unavailable</h3><p class="nt-error-state__description">Please try again in a moment.</p></div><div class="nt-error-state__actions"><button class="nt-button nt-button--secondary" type="button" (click)="loadArticles()">Try again</button></div></div><div *ngIf="!isLoading && !loadError && !articles.length" class="nt-empty-state nt-empty-state--compact"><div class="nt-empty-state__body"><h3 class="nt-empty-state__title">No publications found</h3><p class="nt-empty-state__description">There are no published articles to display.</p></div></div><ol *ngIf="!isLoading && articles.length" class="publication-list"><li *ngFor="let article of articles" class="nt-card nt-card--flat"><div class="nt-card__body"><a class="publication-list__title" [href]="article.link" target="_blank" rel="noopener noreferrer">{{ article.title }}</a><p>{{ article.authors }}</p><p class="publication-list__source">{{ article.source }}</p></div></li></ol></div></section>
